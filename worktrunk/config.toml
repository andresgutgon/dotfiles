[aliases]
# Start a new worktree with the given branch name, based on main
start = "wt switch --create {{ args }} --base main"

# Start a new worktree with the given branch name, based on development
dev_start = "wt switch --create {{ args }} --base development"

# Start a new worktree with the given branch name, based on master
master_start = "wt switch --create {{ args }} --base master"

# Promote (worktree -> main, carrying the Claude agent + repointing upstream)
# lives in worktrunk/promote.sh, invoked by lazygit's `p` key. Intentionally not
# a `wt` alias: it needs the promoted worktree's path, which aliases don't expose,
# and a divergent alias would silently orphan the agent and skip the upstream fix.
